<svg width="420" height="200" viewBox="120 10 180 130" xmlns="http://www.w3.org/2000/svg">
  <style>
    .main {
      font-family: "Segoe UI", Arial, sans-serif;
      font-weight: 700;
      font-size: 66px;
      letter-spacing: 1px;
      fill: #D4AF37;
    }
    .sub {
      font-family: "Segoe UI", Arial, sans-serif;
      font-size: 22px;
      letter-spacing: 8px;
      fill: #D4AF37;
    }
    .roof {
      stroke: #D4AF37;
