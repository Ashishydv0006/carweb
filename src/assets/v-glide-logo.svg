  <!-- Roof curve shifted up and widened -->
  <path class="roof" d="M110 45 Q200 15 310 45" />

  <!-- Main Text -->
  <text x="210" y="100" text-anchor="middle" class="main">V-Glide</text>

  <!-- Sub Text -->
